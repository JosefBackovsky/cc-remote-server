<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firewall Manager</title>
    <style>
        :root[data-theme="dark"] {
            --bg: #1a1a2e; --surface: #16213e; --surface-alt: #1a1a2e;
            --text: #e0e0e0; --text-secondary: #a0a0b0; --text-muted: #707080;
            --border: #2a2a4a; --shadow: rgba(0,0,0,0.3);
            --pending: #f0a030; --approved: #2ecc71; --denied: #e74c3c;
        }
        :root[data-theme="light"] {
            --bg: #f5f5f5; --surface: #fff; --surface-alt: #fafafa;
            --text: #333; --text-secondary: #555; --text-muted: #999;
            --border: #eee; --shadow: rgba(0,0,0,0.1);
            --pending: #e67e22; --approved: #27ae60; --denied: #c0392b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 960px; margin: 0 auto; padding: 20px; background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }
        h1 { margin-bottom: 20px; }
        h2 { margin: 20px 0 10px; cursor: pointer; }
        h2 .toggle { font-size: 0.7em; color: var(--text-muted); margin-left: 8px; }
        table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 6px; overflow: hidden; box-shadow: 0 1px 3px var(--shadow); margin-bottom: 20px; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--surface-alt); font-weight: 600; font-size: 0.85em; text-transform: uppercase; color: var(--text-muted); }
        .status-pending { color: var(--pending); font-weight: 600; }
        .status-approved { color: var(--approved); font-weight: 600; }
        .status-denied { color: var(--denied); font-weight: 600; }
        button { padding: 5px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85em; }
        .btn-approve { background: var(--approved); color: #fff; }
        .btn-approve:hover { opacity: 0.85; }
        .btn-deny { background: var(--denied); color: #fff; margin-left: 4px; }
        .btn-deny:hover { opacity: 0.85; }
        .btn-revoke { background: var(--pending); color: #fff; }
        .btn-revoke:hover { opacity: 0.85; }
        .section-collapsed { display: none; }
        .empty { padding: 20px; text-align: center; color: var(--text-muted); background: var(--surface); border-radius: 6px; box-shadow: 0 1px 3px var(--shadow); margin-bottom: 20px; }
        .reason { max-width: 300px; font-size: 0.9em; color: var(--text-secondary); }
        .count { font-weight: 600; }
        .last-refresh { font-size: 0.8em; color: var(--text-muted); margin-bottom: 20px; }
        .theme-toggle { position: fixed; top: 16px; right: 16px; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85em; box-shadow: 0 1px 3px var(--shadow); }
        .theme-toggle:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">Light Mode</button>
    <h1>Firewall Manager Dashboard</h1>
    <div class="last-refresh">Last refresh: <span id="refresh-time">-</span></div>

    <h2>Rules</h2>
    <div id="add-rule-form" style="margin-bottom: 20px; padding: 15px; background: var(--surface); border-radius: 6px; box-shadow: 0 1px 3px var(--shadow);">
        <div style="display: flex; gap: 8px; flex-wrap: wrap; align-items: end;">
            <div>
                <label style="font-size: 0.8em; color: var(--text-muted);">Domain</label><br>
                <input id="rule-domain" placeholder="example.com" style="padding: 5px 10px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text);">
            </div>
            <div>
                <label style="font-size: 0.8em; color: var(--text-muted);">Action</label><br>
                <select id="rule-action" style="padding: 5px 10px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text);">
                    <option value="allow">Allow</option>
                    <option value="deny">Deny</option>
                </select>
            </div>
            <div>
                <label style="font-size: 0.8em; color: var(--text-muted);">Path Pattern (optional)</label><br>
                <input id="rule-pattern" placeholder=".*/git-receive-pack$" style="padding: 5px 10px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text);">
            </div>
            <div>
                <label style="font-size: 0.8em; color: var(--text-muted);">Description (optional)</label><br>
                <input id="rule-description" placeholder="Why this rule exists" style="padding: 5px 10px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg); color: var(--text);">
            </div>
            <button class="btn-approve" onclick="addRule()">Add Rule</button>
        </div>
    </div>
    <div id="rules-section"></div>

    <script>
        const API = '';

        async function fetchJSON(url, opts) {
            const res = await fetch(API + url, opts);
            return res.json();
        }

        async function loadRules() {
            const data = await fetchJSON('/api/rules');
            const el = document.getElementById('rules-section');
            if (data.length === 0) {
                el.innerHTML = '<div class="empty">No rules configured.</div>';
                return;
            }
            let html = '<table><tr><th>Domain</th><th>Pattern</th><th>Action</th><th>Description</th><th>Actions</th></tr>';
            for (const r of data) {
                const pattern = r.path_pattern || r.path_prefix || '(all paths)';
                const actionClass = r.action === 'deny' ? 'status-denied' : 'status-approved';
                html += `<tr>
                    <td><b>${esc(r.domain)}</b></td>
                    <td>${esc(pattern)}</td>
                    <td class="${actionClass}">${r.action}</td>
                    <td>${esc(r.description || '')}</td>
                    <td><button class="btn-deny" onclick="deleteRule('${r.id}')">Delete</button></td>
                </tr>`;
            }
            html += '</table>';
            el.innerHTML = html;
        }

        async function addRule() {
            const domain = document.getElementById('rule-domain').value.trim();
            const action = document.getElementById('rule-action').value;
            const pathPattern = document.getElementById('rule-pattern').value.trim();
            const description = document.getElementById('rule-description').value.trim();
            if (!domain) return;
            const body = { domain, action };
            if (pathPattern) body.path_pattern = pathPattern;
            if (description) body.description = description;
            await fetchJSON('/api/rules', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            document.getElementById('rule-domain').value = '';
            document.getElementById('rule-pattern').value = '';
            document.getElementById('rule-description').value = '';
            refresh();
        }

        async function deleteRule(id) {
            await fetchJSON(`/api/rules/${id}`, { method: 'DELETE' });
            refresh();
        }

        async function refresh() {
            await loadRules();
            document.getElementById('refresh-time').textContent = new Date().toLocaleTimeString();
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        // Theme
        function initTheme() {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            updateThemeButton(saved);
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeButton(next);
        }
        function updateThemeButton(theme) {
            document.querySelector('.theme-toggle').textContent = theme === 'dark' ? 'Light Mode' : 'Dark Mode';
        }
        initTheme();

        refresh();
        setInterval(refresh, 5000);
    </script>
</body>
</html>
