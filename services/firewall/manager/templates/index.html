<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firewall Manager</title>
    <style>
        :root[data-theme="dark"] {
            --bg: #1a1a2e; --surface: #16213e; --surface-alt: #1a1a2e;
            --text: #e0e0e0; --text-secondary: #a0a0b0; --text-muted: #707080;
            --border: #2a2a4a; --shadow: rgba(0,0,0,0.3);
            --pending: #f0a030; --approved: #2ecc71; --denied: #e74c3c;
        }
        :root[data-theme="light"] {
            --bg: #f5f5f5; --surface: #fff; --surface-alt: #fafafa;
            --text: #333; --text-secondary: #555; --text-muted: #999;
            --border: #eee; --shadow: rgba(0,0,0,0.1);
            --pending: #e67e22; --approved: #27ae60; --denied: #c0392b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; max-width: 960px; margin: 0 auto; padding: 20px; background: var(--bg); color: var(--text); transition: background 0.3s, color 0.3s; }
        h1 { margin-bottom: 20px; }
        h2 { margin: 20px 0 10px; cursor: pointer; }
        h2 .toggle { font-size: 0.7em; color: var(--text-muted); margin-left: 8px; }
        table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 6px; overflow: hidden; box-shadow: 0 1px 3px var(--shadow); margin-bottom: 20px; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: var(--surface-alt); font-weight: 600; font-size: 0.85em; text-transform: uppercase; color: var(--text-muted); }
        .status-pending { color: var(--pending); font-weight: 600; }
        .status-approved { color: var(--approved); font-weight: 600; }
        .status-denied { color: var(--denied); font-weight: 600; }
        button { padding: 5px 14px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85em; }
        .btn-approve { background: var(--approved); color: #fff; }
        .btn-approve:hover { opacity: 0.85; }
        .btn-deny { background: var(--denied); color: #fff; margin-left: 4px; }
        .btn-deny:hover { opacity: 0.85; }
        .btn-revoke { background: var(--pending); color: #fff; }
        .btn-revoke:hover { opacity: 0.85; }
        .section-collapsed { display: none; }
        .empty { padding: 20px; text-align: center; color: var(--text-muted); background: var(--surface); border-radius: 6px; box-shadow: 0 1px 3px var(--shadow); margin-bottom: 20px; }
        .reason { max-width: 300px; font-size: 0.9em; color: var(--text-secondary); }
        .count { font-weight: 600; }
        .last-refresh { font-size: 0.8em; color: var(--text-muted); margin-bottom: 20px; }
        .theme-toggle { position: fixed; top: 16px; right: 16px; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 0.85em; box-shadow: 0 1px 3px var(--shadow); }
        .theme-toggle:hover { opacity: 0.85; }
    </style>
</head>
<body>
    <button class="theme-toggle" onclick="toggleTheme()">Light Mode</button>
    <h1>Firewall Manager Dashboard</h1>
    <div class="last-refresh">Last refresh: <span id="refresh-time">-</span></div>

    <h2>Claude's Requests</h2>
    <div id="requests-section"></div>

    <h2 onclick="toggleBlocked()">Blocked Domains <span class="toggle" id="blocked-toggle">[show]</span></h2>
    <div id="blocked-section" class="section-collapsed"></div>

    <h2 onclick="toggleWhitelist()">Current Whitelist <span class="toggle" id="whitelist-toggle">[show]</span></h2>
    <div id="whitelist-section" class="section-collapsed"></div>

    <script>
        const API = '';

        async function fetchJSON(url, opts) {
            const res = await fetch(API + url, opts);
            return res.json();
        }

        async function loadRequests() {
            const data = await fetchJSON('/api/requests');
            const el = document.getElementById('requests-section');
            if (data.length === 0) {
                el.innerHTML = '<div class="empty">No requests from Claude yet.</div>';
                return;
            }
            let html = '<table><tr><th>Domain</th><th>Reason</th><th>Status</th><th>Time</th><th>Actions</th></tr>';
            for (const r of data) {
                const time = new Date(r.created_at).toLocaleString();
                let actions = '';
                if (r.status === 'pending') {
                    actions = `<button class="btn-approve" onclick="approveReq('${r.id}')">Approve</button>` +
                              `<button class="btn-deny" onclick="denyReq('${r.id}')">Deny</button>`;
                }
                html += `<tr>
                    <td><b>${esc(r.domain)}</b></td>
                    <td class="reason">${esc(r.reason)}</td>
                    <td class="status-${r.status}">${r.status}</td>
                    <td>${time}</td>
                    <td>${actions}</td>
                </tr>`;
            }
            html += '</table>';
            el.innerHTML = html;
        }

        async function loadBlocked() {
            const data = await fetchJSON('/api/blocked');
            const el = document.getElementById('blocked-section');
            if (data.length === 0) {
                el.innerHTML = '<div class="empty">No blocked domains.</div>';
                return;
            }
            let html = '<table><tr><th>Domain</th><th>Blocked Count</th><th>Last Seen</th><th>Actions</th></tr>';
            for (const b of data) {
                const time = new Date(b.last_seen).toLocaleString();
                html += `<tr>
                    <td><b>${esc(b.domain)}</b></td>
                    <td class="count">${b.count}</td>
                    <td>${time}</td>
                    <td><button class="btn-approve" onclick="approveDirect('${esc(b.domain)}')">Approve</button></td>
                </tr>`;
            }
            html += '</table>';
            el.innerHTML = html;
        }

        async function loadWhitelist() {
            const data = await fetchJSON('/api/whitelist');
            const el = document.getElementById('whitelist-section');
            if (data.length === 0) {
                el.innerHTML = '<div class="empty">Whitelist is empty.</div>';
                return;
            }
            let html = '<table><tr><th>Domain</th><th>Actions</th></tr>';
            for (const d of data) {
                html += `<tr>
                    <td>${esc(d)}</td>
                    <td><button class="btn-revoke" onclick="revokeDomain('${esc(d)}')">Revoke</button></td>
                </tr>`;
            }
            html += '</table>';
            el.innerHTML = html;
        }

        async function approveReq(id) {
            await fetchJSON(`/api/requests/${id}/approve`, { method: 'POST' });
            refresh();
        }

        async function denyReq(id) {
            await fetchJSON(`/api/requests/${id}/deny`, { method: 'POST' });
            refresh();
        }

        async function approveDirect(domain) {
            await fetchJSON('/api/approve', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ domain })
            });
            refresh();
        }

        async function revokeDomain(domain) {
            await fetchJSON('/api/revoke', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ domain })
            });
            refresh();
        }

        function toggleBlocked() {
            const el = document.getElementById('blocked-section');
            const toggle = document.getElementById('blocked-toggle');
            el.classList.toggle('section-collapsed');
            toggle.textContent = el.classList.contains('section-collapsed') ? '[show]' : '[hide]';
        }

        function toggleWhitelist() {
            const el = document.getElementById('whitelist-section');
            const toggle = document.getElementById('whitelist-toggle');
            el.classList.toggle('section-collapsed');
            toggle.textContent = el.classList.contains('section-collapsed') ? '[show]' : '[hide]';
        }

        function esc(s) {
            const d = document.createElement('div');
            d.textContent = s;
            return d.innerHTML;
        }

        async function refresh() {
            await Promise.all([loadRequests(), loadBlocked(), loadWhitelist()]);
            document.getElementById('refresh-time').textContent = new Date().toLocaleTimeString();
        }

        // Theme
        function initTheme() {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            updateThemeButton(saved);
        }
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            updateThemeButton(next);
        }
        function updateThemeButton(theme) {
            document.querySelector('.theme-toggle').textContent = theme === 'dark' ? 'Light Mode' : 'Dark Mode';
        }
        initTheme();

        refresh();
        setInterval(refresh, 5000);
    </script>
</body>
</html>
