# Squid forward proxy for devcontainer
# Domain-based filtering via whitelist file

http_port 3128

# PID file
pid_filename /var/run/squid/squid.pid

# Whitelist file — editable at runtime, reloaded via squid -k reconfigure
acl whitelist dstdomain "/data/whitelist.txt"

# HTTPS CONNECT method
acl SSL_ports port 443
acl CONNECT method CONNECT

# Access rules — order matters
http_access allow CONNECT whitelist SSL_ports
http_access allow whitelist
http_access deny all

# Custom error page for blocked requests
error_directory /usr/share/squid/errors/en
deny_info ERR_BLOCKED all

# Logging
access_log /data/logs/access.log
cache_log /data/logs/cache.log
logfile_rotate 3

# No caching — we're just a filtering proxy
cache deny all

# DNS settings — use Docker embedded DNS
dns_nameservers 127.0.0.11

# Timeouts
connect_timeout 30 seconds
read_timeout 60 seconds
