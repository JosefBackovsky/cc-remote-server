name: Test Firewall

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'services/firewall/**'
      - 'tests/integration/test_firewall_container.sh'
  pull_request:
    paths:
      - 'services/firewall/**'
      - 'tests/integration/test_firewall_container.sh'

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          pip install fastapi uvicorn aiosqlite jinja2
      - name: Run unit tests
        working-directory: services/firewall/manager
        run: python -m unittest discover -p "test_*.py" -v

  integration-tests:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v5
      - name: Run integration tests
        run: bash tests/integration/test_firewall_container.sh
